  <rect x="130" y="318" width="78" height="32" rx="16" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="148" y="329" width="44" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>
  <rect x="220" y="318" width="78" height="32" rx="16" fill="#ffffff" fill-opacity="0.05"/>
