  <rect x="320" y="62" width="56" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="400" y="62" width="56" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="480" y="62" width="56" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="1010" cy="68" r="16" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="1042" y="50" width="118" height="36" rx="18" fill="url(#pc-brand)"/>
  <rect x="1066" y="62" width="70" height="12" rx="6" fill="#ffffff" fill-opacity="0.9"/>
