  <rect x="872" y="536" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>
  <rect x="1048" y="536" width="48" height="10" rx="5" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="872" y="568" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>
  <rect x="1048" y="568" width="48" height="10" rx="5" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="872" y="608" width="100" height="13" rx="6.5" fill="#ffffff" fill-opacity="0.75"/>
  <text x="1036" y="623" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">$269</text>

