  <rect x="72" y="156" width="100" height="12" rx="6" fill="#ffffff" fill-opacity="0.7"/>
  <text x="72" y="216" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff">Summer Drop</text>
