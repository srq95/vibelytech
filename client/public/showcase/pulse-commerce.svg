    <rect x="320" y="624" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>
    <text x="320" y="664" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">$124</text>
