    <rect x="952" y="222" width="120" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.6"/>
    <rect x="952" y="242" width="60" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="1052" y="244" width="44" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.7"/>
