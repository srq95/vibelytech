<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" role="img">
  <defs>
    <linearGradient id="pc-bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#120a1f"/>
      <stop offset="1" stop-color="#190b29"/>
    </linearGradient>
    <linearGradient id="pc-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#9333ea"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="pc-prod1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pc-prod2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e879f9"/>
      <stop offset="1" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="pc-prod3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="pc-blur" x="-50%" y="-50%" width="200%" height="200%">
