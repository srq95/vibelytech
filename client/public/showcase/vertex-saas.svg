<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" role="img">
  <defs>
    <linearGradient id="vx-bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f24"/>
      <stop offset="1" stop-color="#081428"/>
    </linearGradient>
    <linearGradient id="vx-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="vx-bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="vx-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vx-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="vx-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#vx-bg)"/>
  <circle cx="1000" cy="180" r="200" fill="#0ea5e9" opacity="0.22" filter="url(#vx-blur)"/>
  <circle cx="220" cy="760" r="200" fill="#4f46e5" opacity="0.26" filter="url(#vx-blur)"/>

  <!-- Top bar -->
  <rect x="40" y="44" width="38" height="38" rx="11" fill="url(#vx-brand)"/>
  <rect x="90" y="56" width="92" height="14" rx="7" fill="#ffffff" fill-opacity="0.8"/>
  <rect x="640" y="50" width="280" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <circle cx="668" cy="70" r="7" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="688" y="64" width="120" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="952" y="50" width="120" height="40" rx="20" fill="url(#vx-brand)"/>
  <rect x="980" y="62" width="64" height="14" rx="7" fill="#ffffff" fill-opacity="0.95"/>
  <circle cx="1130" cy="70" r="20" fill="#ffffff" fill-opacity="0.08"/>

  <!-- KPI cards -->
  <g>
    <rect x="40" y="120" width="270" height="130" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="68" y="148" width="96" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.35"/>
    <text x="68" y="208" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">48.2k</text>
    <rect x="68" y="226" width="110" height="9" rx="4.5" fill="#38bdf8" fill-opacity="0.7"/>
    <rect x="232" y="148" width="54" height="22" rx="11" fill="#22c55e" fill-opacity="0.18"/>
    <text x="244" y="164" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ade80">+24%</text>
  </g>
  <g>
    <rect x="330" y="120" width="270" height="130" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="358" y="148" width="96" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.35"/>
    <text x="358" y="208" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">$92.4k</text>
    <rect x="358" y="226" width="90" height="9" rx="4.5" fill="#818cf8" fill-opacity="0.7"/>
    <rect x="522" y="148" width="54" height="22" rx="11" fill="#22c55e" fill-opacity="0.18"/>
    <text x="534" y="164" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ade80">+12%</text>
  </g>
  <g>
    <rect x="620" y="120" width="270" height="130" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="648" y="148" width="96" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.35"/>
    <text x="648" y="208" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">3.9%</text>
    <rect x="648" y="226" width="120" height="9" rx="4.5" fill="#38bdf8" fill-opacity="0.7"/>
    <rect x="812" y="148" width="54" height="22" rx="11" fill="#22c55e" fill-opacity="0.18"/>
    <text x="824" y="164" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ade80">+8%</text>
  </g>
  <!-- donut KPI -->
  <g>
    <rect x="910" y="120" width="250" height="130" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="970" cy="185" r="36" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="11"/>
    <path d="M970 149 a36 36 0 1 1 -25 62" fill="none" stroke="url(#vx-brand)" stroke-width="11" stroke-linecap="round"/>
    <text x="945" y="192" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">76%</text>
    <rect x="1030" y="160" width="100" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.5"/>
    <rect x="1030" y="184" width="70" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="1030" y="204" width="84" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.3"/>
  </g>

  <!-- Main area chart -->
  <rect x="40" y="280" width="700" height="340" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="72" y="312" width="150" height="13" rx="6.5" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="72" y="334" width="90" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="612" y="308" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="630" y="318" width="60" height="10" rx="5" fill="#ffffff" fill-opacity="0.4"/>
  <!-- gridlines -->
  <line x1="72" y1="420" x2="708" y2="420" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="72" y1="480" x2="708" y2="480" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="72" y1="540" x2="708" y2="540" stroke="#ffffff" stroke-opacity="0.05"/>
  <path d="M72 560 L150 520 L228 540 L306 470 L384 500 L462 430 L540 458 L618 392 L708 410 L708 580 L72 580 Z" fill="url(#vx-area)"/>
  <path d="M72 560 L150 520 L228 540 L306 470 L384 500 L462 430 L540 458 L618 392 L708 410" stroke="url(#vx-line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="618" cy="392" r="7" fill="#38bdf8" stroke="#0a0f24" stroke-width="3"/>

  <!-- Bar chart card -->
  <rect x="760" y="280" width="400" height="340" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="792" y="312" width="140" height="13" rx="6.5" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="816" y="560" width="36" height="20" rx="6" fill="url(#vx-bar)" opacity="0.85"/>
  <rect x="816" y="510" width="36" height="70" rx="6" fill="url(#vx-bar)" opacity="0.85"/>
  <rect x="868" y="470" width="36" height="110" rx="6" fill="url(#vx-bar)" opacity="0.9"/>
  <rect x="920" y="430" width="36" height="150" rx="6" fill="url(#vx-bar)"/>
  <rect x="972" y="500" width="36" height="80" rx="6" fill="url(#vx-bar)" opacity="0.85"/>
  <rect x="1024" y="400" width="36" height="180" rx="6" fill="url(#vx-bar)"/>
  <rect x="1076" y="448" width="36" height="132" rx="6" fill="url(#vx-bar)" opacity="0.9"/>

  <!-- Bottom table -->
  <rect x="40" y="650" width="1120" height="210" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="72" y="682" width="130" height="12" rx="6" fill="#ffffff" fill-opacity="0.6"/>
  <g opacity="0.9">
    <rect x="72" y="722" width="200" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="520" y="722" width="120" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="900" y="722" width="60" height="18" rx="9" fill="#4ade80" fill-opacity="0.4"/>
    <line x1="72" y1="752" x2="1128" y2="752" stroke="#ffffff" stroke-opacity="0.06"/>

    <rect x="72" y="772" width="220" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="520" y="772" width="100" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="900" y="772" width="60" height="18" rx="9" fill="#818cf8" fill-opacity="0.4"/>
    <line x1="72" y1="802" x2="1128" y2="802" stroke="#ffffff" stroke-opacity="0.06"/>

    <rect x="72" y="822" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="520" y="822" width="140" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    <rect x="900" y="822" width="60" height="18" rx="9" fill="#4ade80" fill-opacity="0.4"/>
  </g>
</svg>
