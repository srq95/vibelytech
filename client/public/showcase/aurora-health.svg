<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" role="img">
  <defs>
    <linearGradient id="ah-bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081222"/>
      <stop offset="1" stop-color="#0a1830"/>
    </linearGradient>
    <linearGradient id="ah-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="ah-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1730"/>
      <stop offset="1" stop-color="#0a1226"/>
    </linearGradient>
    <linearGradient id="ah-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="ah-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#ah-bg)"/>
  <circle cx="380" cy="240" r="220" fill="#06b6d4" opacity="0.22" filter="url(#ah-blur)"/>
  <circle cx="860" cy="720" r="220" fill="#4338ca" opacity="0.26" filter="url(#ah-blur)"/>

  <!-- Floating side cards (left) -->
  <g>
    <rect x="120" y="250" width="270" height="120" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="166" cy="310" r="26" fill="#06b6d4" fill-opacity="0.25"/>
    <path d="M154 310 l8 8 l16 -18" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="208" y="290" width="140" height="12" rx="6" fill="#ffffff" fill-opacity="0.6"/>
    <rect x="208" y="314" width="96" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
  </g>
  <g>
    <rect x="150" y="500" width="240" height="150" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="178" y="528" width="100" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.45"/>
    <text x="178" y="588" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">72</text>
    <text x="248" y="588" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#67e8f9">bpm</text>
    <path d="M178 624 h22 l8 -20 l12 36 l10 -28 l8 12 h64" stroke="url(#ah-pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Floating side cards (right) -->
  <g>
    <rect x="810" y="300" width="280" height="160" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="838" y="328" width="120" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.45"/>
    <circle cx="900" cy="400" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="10"/>
    <path d="M900 360 a40 40 0 0 1 34 60" fill="none" stroke="url(#ah-brand)" stroke-width="10" stroke-linecap="round"/>
    <text x="978" y="392" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">8,240</text>
    <text x="978" y="416" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#94a3c2">steps</text>
  </g>
  <g>
    <rect x="840" y="540" width="240" height="110" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="884" cy="595" r="22" fill="#4338ca" fill-opacity="0.3"/>
    <rect x="920" y="576" width="130" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="920" y="600" width="86" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
  </g>

  <!-- Phone -->
  <g>
    <rect x="455" y="90" width="290" height="720" rx="54" fill="#05070f"/>
    <rect x="455" y="90" width="290" height="720" rx="54" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <rect x="467" y="102" width="266" height="696" rx="44" fill="url(#ah-screen)"/>
    <!-- notch -->
    <rect x="560" y="120" width="80" height="20" rx="10" fill="#05070f"/>

    <!-- status -->
    <rect x="491" y="160" width="60" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>

    <!-- greeting -->
    <rect x="491" y="194" width="120" height="14" rx="7" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="491" y="216" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="697" cy="206" r="20" fill="url(#ah-brand)"/>

    <!-- next appointment hero -->
    <rect x="491" y="252" width="218" height="128" rx="22" fill="url(#ah-brand)"/>
    <rect x="513" y="276" width="96" height="10" rx="5" fill="#ffffff" fill-opacity="0.7"/>
    <rect x="513" y="298" width="150" height="14" rx="7" fill="#ffffff" fill-opacity="0.95"/>
    <rect x="513" y="324" width="110" height="10" rx="5" fill="#ffffff" fill-opacity="0.6"/>
    <rect x="513" y="346" width="86" height="22" rx="11" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="527" y="352" width="58" height="10" rx="5" fill="#ffffff" fill-opacity="0.9"/>

    <!-- vitals row -->
    <rect x="491" y="398" width="103" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="517" cy="424" r="12" fill="#06b6d4" fill-opacity="0.3"/>
    <text x="505" y="466" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">98%</text>
    <rect x="505" y="476" width="56" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>

    <rect x="606" y="398" width="103" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="632" cy="424" r="12" fill="#818cf8" fill-opacity="0.35"/>
    <text x="620" y="466" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">7.4h</text>
    <rect x="620" y="476" width="56" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>

    <!-- schedule list -->
    <rect x="491" y="512" width="130" height="12" rx="6" fill="#ffffff" fill-opacity="0.55"/>
    <g>
      <rect x="491" y="538" width="218" height="56" rx="16" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="507" y="554" width="40" height="24" rx="8" fill="#06b6d4" fill-opacity="0.25"/>
      <rect x="563" y="554" width="110" height="10" rx="5" fill="#ffffff" fill-opacity="0.6"/>
      <rect x="563" y="572" width="72" height="8" rx="4" fill="#ffffff" fill-opacity="0.28"/>
    </g>
    <g>
      <rect x="491" y="606" width="218" height="56" rx="16" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="507" y="622" width="40" height="24" rx="8" fill="#818cf8" fill-opacity="0.3"/>
      <rect x="563" y="622" width="92" height="10" rx="5" fill="#ffffff" fill-opacity="0.6"/>
      <rect x="563" y="640" width="64" height="8" rx="4" fill="#ffffff" fill-opacity="0.28"/>
    </g>

    <!-- tab bar -->
    <rect x="467" y="730" width="266" height="68" rx="0" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="525" cy="762" r="6" fill="#22d3ee"/>
    <circle cx="590" cy="762" r="6" fill="#ffffff" fill-opacity="0.25"/>
    <circle cx="655" cy="762" r="6" fill="#ffffff" fill-opacity="0.25"/>
  </g>
</svg>
